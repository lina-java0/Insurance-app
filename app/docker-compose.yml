networks:
  java:

services:
  message-broker:
    networks: [java]
    container_name: rabbitmq-container
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  db:
    networks: [java]
    container_name: mysql-container
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: insurance-calculator-db
    ports:
      - "3000:3306"

  insurance-calculator-app:
    networks: [java]
    container_name: insurance-calc-container
    image: insurance-calculator:1.0.0
    ports:
      - "8080:8080"
    depends_on:
      - message-broker
      - db
    volumes:
      - C:\Users\Lina\IdeaProjects\Insurance-app\app\export:/app/export
